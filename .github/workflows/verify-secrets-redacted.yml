name: Verify Secrets (Redacted)

on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify required secrets without exposing values
    runs-on: ubuntu-latest
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Ensure Doppler token exists
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::error::Missing GitHub secret: DOPPLER_TOKEN"
            exit 1
          fi

      - name: Load Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Validate required secrets from Doppler (length only)
        shell: bash
        run: |
          set -euo pipefail
          export DOPPLER_PROJECT="android-multi-app-framework"
          export DOPPLER_CONFIG="prod"

          get_doppler_secret() {
            local key="$1"
            doppler secrets get "$key" --plain --project "$DOPPLER_PROJECT" --config "$DOPPLER_CONFIG" 2>/dev/null || true
          }

          check_secret() {
            local key="$1"
            local min_len="$2"
            local value
            value="$(get_doppler_secret "$key")"
            local len="${#value}"
            if [ "$len" -lt "$min_len" ]; then
              echo "::error::Doppler ${key} missing or too short (len=${len}, expected>=${min_len})"
              return 1
            fi
            echo "::notice::Doppler ${key} OK (len=${len})"
          }

          check_any_play_secret() {
            local b64 json b64_len json_len
            b64="$(get_doppler_secret PLAY_SERVICE_ACCOUNT_JSON_BASE64)"
            json="$(get_doppler_secret PLAY_SERVICE_ACCOUNT_JSON)"
            b64_len="${#b64}"
            json_len="${#json}"
            if [ "$b64_len" -ge 500 ]; then
              echo "::notice::Doppler PLAY service account via PLAY_SERVICE_ACCOUNT_JSON_BASE64 (len=${b64_len})"
              return 0
            fi
            if [ "$json_len" -ge 200 ]; then
              echo "::notice::Doppler PLAY service account via PLAY_SERVICE_ACCOUNT_JSON (len=${json_len})"
              return 0
            fi
            echo "::error::Doppler PLAY service account missing/too short in both PLAY_SERVICE_ACCOUNT_JSON_BASE64 and PLAY_SERVICE_ACCOUNT_JSON"
            return 1
          }

          check_secret KEYSTORE_BASE64 1000
          check_secret KEYSTORE_PASSWORD 4
          check_secret KEY_ALIAS 2
          check_secret KEY_PASSWORD 4
          check_secret PUSH_REGISTRATION_URL 12
          check_secret FIREBASE_WEB_CLIENT_ID 20
          check_secret ADMIN_ALLOWED_EMAILS 8
          check_secret ADMOB_CLIENT_ID 20
          check_secret ADMOB_CLIENT_SECRET 20
          check_secret ADMOB_REFRESH_TOKEN 20
          check_secret ADMOB_PUBLISHER_ID 10
          check_any_play_secret

          push_url="$(get_doppler_secret PUSH_REGISTRATION_URL)"
          if [[ "$push_url" != https://* ]]; then
            echo "::error::PUSH_REGISTRATION_URL must start with https://"
            exit 1
          fi

          echo "::notice::All required secrets are readable from Doppler. Values were not printed."

      - name: Validate Firebase Functions env contract (Doppler)
        shell: bash
        run: |
          set -euo pipefail
          node ./side-projects/firebase/functions/scripts/verify-functions-env.mjs
