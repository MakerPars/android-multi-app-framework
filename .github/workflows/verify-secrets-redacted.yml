name: Verify Secrets (Redacted)

on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify required secrets without exposing values
    runs-on: ubuntu-latest
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - name: Validate secret presence and print lengths only
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          FIREBASE_WEB_CLIENT_ID: ${{ secrets.FIREBASE_WEB_CLIENT_ID }}
          PUSH_REGISTRATION_URL: ${{ secrets.PUSH_REGISTRATION_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          check_secret() {
            local name="$1"
            local min_len="$2"
            local value="${!name:-}"
            local len="${#value}"

            if [ "$len" -lt "$min_len" ]; then
              echo "::error::${name} missing or too short (len=${len}, expected>=${min_len})"
              return 1
            fi

            echo "::notice::${name} OK (len=${len})"
          }

          check_secret DOPPLER_TOKEN 20
          check_secret KEYSTORE_BASE64 1000
          check_secret KEYSTORE_PASSWORD 4
          check_secret KEY_ALIAS 2
          check_secret KEY_PASSWORD 4
          check_secret PUSH_REGISTRATION_URL 12
          check_secret SENTRY_AUTH_TOKEN 20

          PLAY_JSON_LEN="${#PLAY_SERVICE_ACCOUNT_JSON}"
          PLAY_B64_LEN="${#PLAY_SERVICE_ACCOUNT_JSON_BASE64}"
          if [ "$PLAY_B64_LEN" -ge 500 ]; then
            echo "::notice::PLAY service account found via PLAY_SERVICE_ACCOUNT_JSON_BASE64 (len=${PLAY_B64_LEN})"
          elif [ "$PLAY_JSON_LEN" -ge 200 ]; then
            echo "::notice::PLAY service account found via PLAY_SERVICE_ACCOUNT_JSON (len=${PLAY_JSON_LEN})"
          elif [ -n "${DOPPLER_TOKEN:-}" ]; then
            echo "::warning::PLAY service account missing in GitHub secrets; expecting Doppler fallback."
          else
            echo "::error::Missing PLAY service account secret (set PLAY_SERVICE_ACCOUNT_JSON or PLAY_SERVICE_ACCOUNT_JSON_BASE64)."
            exit 1
          fi

          FIREBASE_WEB_CLIENT_ID_LEN="${#FIREBASE_WEB_CLIENT_ID}"
          if [ "$FIREBASE_WEB_CLIENT_ID_LEN" -ge 20 ]; then
            echo "::notice::FIREBASE_WEB_CLIENT_ID OK (len=${FIREBASE_WEB_CLIENT_ID_LEN})"
          elif [ -n "${DOPPLER_TOKEN:-}" ]; then
            echo "::warning::FIREBASE_WEB_CLIENT_ID missing in GitHub secrets; expecting Doppler fallback."
          else
            echo "::error::FIREBASE_WEB_CLIENT_ID missing and Doppler fallback unavailable."
            exit 1
          fi

          if [[ "${PUSH_REGISTRATION_URL}" != https://* ]]; then
            echo "::error::PUSH_REGISTRATION_URL must start with https://"
            exit 1
          fi

          echo "::notice::All required secrets are readable. Values were not printed."

      - name: Load Doppler CLI (optional)
        if: ${{ env.DOPPLER_TOKEN != '' }}
        uses: dopplerhq/cli-action@v3

      - name: Validate AdMob report secrets from Doppler (length only)
        if: ${{ env.DOPPLER_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          export DOPPLER_PROJECT="android-multi-app-framework"
          export DOPPLER_CONFIG="prod"

          get_doppler_secret() {
            local key="$1"
            doppler secrets get "$key" --plain --project "$DOPPLER_PROJECT" --config "$DOPPLER_CONFIG" 2>/dev/null || true
          }

          check_doppler_secret() {
            local key="$1"
            local min_len="$2"
            local value
            value="$(get_doppler_secret "$key")"
            local len="${#value}"
            if [ "$len" -lt "$min_len" ]; then
              echo "::error::Doppler ${key} missing or too short (len=${len}, expected>=${min_len})"
              return 1
            fi
            echo "::notice::Doppler ${key} OK (len=${len})"
          }

          check_doppler_any_play_secret() {
            local b64 json b64_len json_len
            b64="$(get_doppler_secret PLAY_SERVICE_ACCOUNT_JSON_BASE64)"
            json="$(get_doppler_secret PLAY_SERVICE_ACCOUNT_JSON)"
            b64_len="${#b64}"
            json_len="${#json}"
            if [ "$b64_len" -ge 500 ]; then
              echo "::notice::Doppler PLAY service account via PLAY_SERVICE_ACCOUNT_JSON_BASE64 (len=${b64_len})"
              return 0
            fi
            if [ "$json_len" -ge 200 ]; then
              echo "::notice::Doppler PLAY service account via PLAY_SERVICE_ACCOUNT_JSON (len=${json_len})"
              return 0
            fi
            echo "::error::Doppler PLAY service account missing/too short in both PLAY_SERVICE_ACCOUNT_JSON_BASE64 and PLAY_SERVICE_ACCOUNT_JSON"
            return 1
          }

          check_doppler_secret ADMOB_CLIENT_ID 20
          check_doppler_secret ADMOB_CLIENT_SECRET 20
          check_doppler_secret ADMOB_REFRESH_TOKEN 20
          check_doppler_secret ADMOB_PUBLISHER_ID 10
          check_doppler_secret ADMIN_ALLOWED_EMAILS 8
          check_doppler_secret FIREBASE_WEB_CLIENT_ID 20
          check_doppler_any_play_secret

      - name: Validate Firebase Functions env contract (Doppler)
        if: ${{ env.DOPPLER_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          node ./side-projects/firebase/functions/scripts/verify-functions-env.mjs
