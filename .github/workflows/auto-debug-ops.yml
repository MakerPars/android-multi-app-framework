name: Auto Debug Ops

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'core/**'
      - 'feature/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'app-versions.properties'
      - 'scripts/ci/**'
      - 'scripts/sync-env-contract-from-doppler.mjs'
      - '.github/actions/resolve-flavors/**'
      - '.github/actions/firebase-config/**'
      - '.github/actions/verify-env-contract/**'
  pull_request:
    branches: ['*']
    paths:
      - 'app/**'
      - 'core/**'
      - 'feature/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'app-versions.properties'
      - 'scripts/ci/**'
      - 'scripts/sync-env-contract-from-doppler.mjs'
      - '.github/actions/resolve-flavors/**'
      - '.github/actions/firebase-config/**'
      - '.github/actions/verify-env-contract/**'

concurrency:
  group: ${{ format('ci-{0}-{1}', github.workflow, github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx6g -Djava.awt.headless=true -Dkotlin.daemon.jvmargs=-Xmx1g -Dorg.gradle.workers.max=2 -Dorg.gradle.daemon=false -Dksp.incremental=false
  JAVA_VERSION: '21'
  ANDROID_API_LEVEL: 36

jobs:
  auto-debug-ops:
    name: Auto Debug Ops (all flavors / Debug)
    runs-on: ubuntu-latest
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: false
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          sdkmanager --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;36.0.0"

      - name: Accept Android SDK licenses (non-interactive)
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          set +o pipefail
          yes | sdkmanager --licenses --sdk_root="$SDK_ROOT" >/dev/null
          set -o pipefail

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Resolve Flavors
        id: resolve
        uses: ./.github/actions/resolve-flavors
        with:
          target_flavors: all

      - name: Export resolved flavors env
        run: |
          echo "RESOLVED_FLAVORS_JSON=${{ steps.resolve.outputs.resolved_json }}" >> "$GITHUB_ENV"
          echo "RESOLVED_FLAVORS_CSV=${{ steps.resolve.outputs.resolved_csv }}" >> "$GITHUB_ENV"

      - name: Load Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Verify env contract (Doppler -> templates)
        uses: ./.github/actions/verify-env-contract

      - name: Export firebase override + web client from Doppler
        run: |
          set -euo pipefail
          [ -n "${DOPPLER_TOKEN:-}" ] || { echo "::error::Missing DOPPLER_TOKEN"; exit 1; }
          export DOPPLER_PROJECT="android-multi-app-framework"
          export DOPPLER_CONFIG="prod"
          map_secret() {
            local src="$1"
            local dst="$2"
            local val
            val="$(doppler secrets get "$src" --plain --project "$DOPPLER_PROJECT" --config "$DOPPLER_CONFIG" 2>/dev/null || true)"
            if [ -n "$val" ]; then
              echo "::add-mask::$val"
              printf '%s=%s\n' "$dst" "$val" >> "$GITHUB_ENV"
              export "$dst=$val"
            fi
          }

          map_secret_if_missing() {
            local src="$1"
            local dst="$2"
            if [ -n "${!dst:-}" ]; then
              return 0
            fi
            map_secret "$src" "$dst"
          }

          map_secret FIREBASE_CONFIGS_ZIP_BASE64 FIREBASE_CONFIGS_ZIP_BASE64
          map_secret FIREBASE_WEB_CLIENT_ID FIREBASE_WEB_CLIENT_ID
          map_secret CF_R2_BUCKET CF_R2_BUCKET
          map_secret CF_R2_FIREBASE_OBJECT CF_R2_FIREBASE_OBJECT
          map_secret CF_R2_ACCOUNT_ID CF_R2_ACCOUNT_ID
          map_secret_if_missing CLOUDFLARE_ACCOUNT_ID CF_R2_ACCOUNT_ID
          map_secret CF_API_TOKEN CF_API_TOKEN
          map_secret_if_missing CLOUDFLARE_API_TOKEN CF_API_TOKEN

      - name: Firebase Config Override (R2 preferred, Base64 fallback)
        uses: ./.github/actions/firebase-config
        with:
          firebase_configs_zip_base64: ${{ env.FIREBASE_CONFIGS_ZIP_BASE64 }}
          cf_r2_account_id: ${{ env.CF_R2_ACCOUNT_ID }}
          cf_api_token: ${{ env.CF_API_TOKEN }}
          cf_r2_bucket: ${{ env.CF_R2_BUCKET }}
          cf_r2_firebase_object: ${{ env.CF_R2_FIREBASE_OBJECT }}

      - name: Validate Google Sign-In Config
        run: |
          WEB_CLIENT_ID="${FIREBASE_WEB_CLIENT_ID:-}" python3 ./scripts/ci/verify_google_signin_config.py --flavors "${{ steps.resolve.outputs.resolved_csv }}"

      - name: Run Quality Checks (detekt / ktlint / lint)
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew detekt ktlintCheck --stacktrace --no-daemon --max-workers=2

          mapfile -t FLAVORS < <(
            echo "$RESOLVED_FLAVORS_JSON" | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d'
          )

          TASKS=()
          for flavor in "${FLAVORS[@]}"; do
            [ -z "$flavor" ] && continue
            cap="$(tr '[:lower:]' '[:upper:]' <<< "${flavor:0:1}")${flavor:1}"
            TASKS+=("lint${cap}Debug")
          done

          if [ "${#TASKS[@]}" -gt 0 ]; then
            ./gradlew "${TASKS[@]}" --stacktrace --no-daemon --max-workers=2
          fi

      - name: Build Debug APKs (all resolved flavors)
        run: |
          set -euo pipefail
          chmod +x ./gradlew

          mapfile -t FLAVORS < <(
            echo "$RESOLVED_FLAVORS_JSON" | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d'
          )

          TASKS=()
          for flavor in "${FLAVORS[@]}"; do
            [ -z "$flavor" ] && continue
            cap="$(tr '[:lower:]' '[:upper:]' <<< "${flavor:0:1}")${flavor:1}"
            TASKS+=("assemble${cap}Debug")
          done

          if [ "${#TASKS[@]}" -eq 0 ]; then
            echo "No resolved flavors found"
            exit 1
          fi

          echo "Running: ${TASKS[*]}"
          ./gradlew "${TASKS[@]}" --stacktrace --no-daemon --max-workers=2

      - name: Upload Build Outputs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: auto-debug-ops-build-outputs
          path: app/build/outputs/
          retention-days: 7
