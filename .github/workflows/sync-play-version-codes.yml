name: Sync Play Version Codes

on:
  workflow_dispatch:
    inputs:
      target_flavors:
        description: 'Target flavors (comma-separated) or "all"'
        required: true
        default: 'all'
        type: string

concurrency:
  group: ${{ format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  sync:
    name: Sync app-versions.properties from Play (artifact only)
    runs-on: ubuntu-latest
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Resolve Flavors
        id: resolve
        uses: ./.github/actions/resolve-flavors
        with:
          target_flavors: ${{ github.event.inputs.target_flavors }}

      - name: Validate CI apps catalog (warn)
        run: |
          set -euo pipefail
          python3 ./scripts/ci/validate_ci_apps_catalog.py --mode warn --target-flavors "${{ steps.resolve.outputs.resolved_csv }}"

      - name: Validate AdMob inventory (warn)
        run: |
          set -euo pipefail
          python3 ./scripts/ci/validate_admob_inventory.py --mode warn --target-flavors "${{ steps.resolve.outputs.resolved_csv }}"

      - name: Load secrets from Doppler (optional)
        if: ${{ env.DOPPLER_TOKEN != '' }}
        uses: dopplerhq/cli-action@v3

      - name: Resolve Play secret (Doppler-only)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          export DOPPLER_PROJECT="android-multi-app-framework"
          export DOPPLER_CONFIG="prod"
          unset PLAY_SERVICE_ACCOUNT_JSON_BASE64

          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::error::Missing DOPPLER_TOKEN. This workflow is Doppler-only."
            exit 1
          fi

          resolved_play_sa_b64="$(doppler secrets get PLAY_SERVICE_ACCOUNT_JSON_BASE64 --plain --project "$DOPPLER_PROJECT" --config "$DOPPLER_CONFIG" 2>/dev/null || true)"
          resolved_play_sa_b64="$(printf '%s' "$resolved_play_sa_b64" | tr -d '\r\n\t ')"

          if [ -z "${resolved_play_sa_b64:-}" ]; then
            echo "::error::Missing Doppler secret: PLAY_SERVICE_ACCOUNT_JSON_BASE64"
            exit 1
          fi
          if [ "${#resolved_play_sa_b64}" -lt 500 ]; then
            echo "::error::Resolved Play service account payload is too short to be valid (len=${#resolved_play_sa_b64})."
            exit 1
          fi

          echo "::add-mask::$resolved_play_sa_b64"
          printf 'PLAY_SERVICE_ACCOUNT_JSON_BASE64=%s\n' "$resolved_play_sa_b64" >> "$GITHUB_ENV"
          echo "::notice::Resolved Play service account from Doppler key: PLAY_SERVICE_ACCOUNT_JSON_BASE64"

      - name: Decode Play Service Account
        run: |
          set -euo pipefail
          if [ -z "${PLAY_SERVICE_ACCOUNT_JSON_BASE64:-}" ]; then
            echo "::error::Missing secret: PLAY_SERVICE_ACCOUNT_JSON_BASE64."
            exit 1
          fi
          echo "$PLAY_SERVICE_ACCOUNT_JSON_BASE64" | base64 -d > "${{ runner.temp }}/service-account.json"
          if [ ! -s "${{ runner.temp }}/service-account.json" ]; then
            echo "::error::Decoded Play service account is empty. Check Doppler PLAY_SERVICE_ACCOUNT_JSON_BASE64."
            exit 1
          fi
          python3 - <<'PY'
          import json, os, sys
          path = os.environ.get("RUNNER_TEMP", "") + "/service-account.json"
          try:
              with open(path, "r", encoding="utf-8") as f:
                  data = json.load(f)
          except Exception as e:
              print(f"::error::Decoded Play service account is not valid JSON: {e}")
              sys.exit(1)
          required = ("project_id", "client_email", "private_key")
          missing = [k for k in required if not data.get(k)]
          if missing:
              print(f"::error::Decoded Play service account missing keys: {', '.join(missing)}")
              sys.exit(1)
          print("::notice::Decoded Play service account JSON structure looks valid.")
          PY
          echo "PLAY_SERVICE_ACCOUNT_JSON=${{ runner.temp }}/service-account.json" >> "$GITHUB_ENV"

      - name: Verify Play service account project
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ runner.temp }}/service-account.json
        run: |
          python3 ./scripts/ci/verify_play_service_account_project.py \
            --expected-project-id makerpars-oaslananka-mobil

      - name: Sync from Play (all tracks)
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ runner.temp }}/service-account.json
        run: |
          set -euo pipefail
          echo "::notice::Syncing app-versions.properties from Play (tracks=all, flavors=${{ steps.resolve.outputs.resolved_csv }})"
          python3 -m pip install --quiet google-api-python-client google-auth
          python3 ./scripts/ci/fetch_play_version_codes.py \
            --flavors "${{ steps.resolve.outputs.resolved_csv }}" \
            --tracks all \
            --apply-to-app-versions \
            --sync-version-names

      - name: Upload synced app-versions.properties
        uses: actions/upload-artifact@v6
        with:
          name: synced-app-versions
          path: app-versions.properties
          retention-days: 30

      - name: Upload Play versionCode report
        uses: actions/upload-artifact@v6
        with:
          name: play-version-codes-report
          path: |
            TEMP_OUT/play_version_codes.json
            TEMP_OUT/app-versions.properties.suggested
          retention-days: 30

      - name: Cleanup Secrets
        if: always()
        run: rm -f "${{ runner.temp }}/service-account.json"
